<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent Mood Board Builder</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- html2canvas for saving the image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-board-default: #ffffff;
            --app-pink: #ffd1dc;
            --dark-pink: #ffb6c1;
            --button-grey: #4a4a4a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--app-pink);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Top Controls UI */
        .ui-panel {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Unified Button & Input Styles */
        button, .file-upload-btn, input[type="text"], input[type="search"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            border: 1px solid #e0e0e0;
            outline: none;
            text-align: center;
            margin: 0;
        }
        
        button, .file-upload-btn {
            background: var(--button-grey);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: block;
        }
        
        button:active, .file-upload-btn:active { background: #333; }
        
        /* Hide default file input, use label as button */
        input[type="file"] { display: none; }

        /* Color Picker Styling */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 5px 15px;
        }
        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
        }

        /* Expandable Library Section */
        #library-section {
            display: none; /* Hidden until button is clicked */
            flex-direction: column;
            gap: 10px;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        #database-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .db-note {
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .db-note img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        /* Mood Board Container */
        #capture-area {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-board-default);
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #main-image-display {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background-color: #f7f7f7;
            display: none;
        }
        .board-content { padding: 20px; }
        #board-title-display {
            width: 100%;
            font-size: 1.4rem;
            padding: 8px 0;
            border: none;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
            background: transparent;
            color: #222;
        }
        #selected-notes-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .board-note {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 75px;
            cursor: pointer;
        }
        .board-note img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .board-note span {
            font-size: 0.75rem;
            text-align: center;
            color: #333;
            line-height: 1.1;
        }

        /* Database Management Section (Hidden away) */
        details {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        details summary { cursor: pointer; font-weight: bold; color: #4a4a4a; margin-bottom: 10px;}
        .db-manage-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        .db-manage-group:last-child { border: none; margin-bottom: 0; padding-bottom: 0;}
    </style>
</head>
<body>

    <!-- 1. MAIN UI PANEL -->
    <div class="ui-panel">
        
        <!-- Pick Your Notes Toggle -->
        <button onclick="toggleLibrary()" style="background: var(--dark-pink); color: #333;">Pick your notes</button>
        
        <!-- Library & Search (Expands when button above is clicked) -->
        <div id="library-section">
            <input type="search" id="search-bar" placeholder="Search notes..." oninput="filterDatabase()">
            <div id="database-list"></div>
        </div>

        <!-- Title Input -->
        <input type="text" id="title-input" placeholder="Enter your mood board title here" oninput="updateTitle()">

        <!-- Add a Photo Button -->
        <label class="file-upload-btn">
            Add a photo
            <input type="file" id="main-image-upload" accept="image/*">
        </label>

        <!-- Color Picker -->
        <div class="color-picker-wrapper">
            <span>Background Color</span>
            <input type="color" id="bg-color-picker" value="#ffffff">
        </div>

        <!-- Save Image Button -->
        <button onclick="saveImage()" style="background: #28a745;">Save the image</button>

    </div>

    <!-- 2. MOOD BOARD DISPLAY -->
    <div id="capture-area">
        <img id="main-image-display" src="" alt="Atmosphere">
        <div class="board-content">
            <input type="text" id="board-title-display" placeholder="Title will appear here..." readonly>
            <div id="selected-notes-container"></div>
        </div>
    </div>

    <!-- 3. DATABASE MANAGEMENT (Tucked away) -->
    <details>
        <summary>Database Settings (Add Notes / Backup)</summary>
        
        <div class="db-manage-group">
            <strong>Add New Note</strong>
            <label class="file-upload-btn" style="background: #ccc; color: #333;">
                Choose Image
                <input type="file" id="note-image-upload" accept="image/*">
            </label>
            <input type="text" id="note-name-input" placeholder="Note Title (e.g., Cold Air)">
            <button onclick="saveToIndexedDB()">Save Note to Database</button>
        </div>

        <div class="db-manage-group">
            <strong>Backup & Restore</strong>
            <button onclick="exportDatabase()" style="background: #ccc; color: #333;">Export Database Backup</button>
            <label class="file-upload-btn" style="background: #ccc; color: #333;">
                Import Backup
                <input type="file" id="import-file" accept=".json" onchange="importDatabase(event)">
            </label>
        </div>
    </details>

    <script>
        // PWA App Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
        }

        // --- UI Interactions ---

        // Toggle Library Visibility
        function toggleLibrary() {
            const lib = document.getElementById('library-section');
            lib.style.display = lib.style.display === 'flex' ? 'none' : 'flex';
        }

        // Live Title Update
        function updateTitle() {
            document.getElementById('board-title-display').value = document.getElementById('title-input').value;
        }

        // Change Background Color
        document.getElementById('bg-color-picker').addEventListener('input', (e) => {
            document.getElementById('capture-area').style.backgroundColor = e.target.value;
        });

        // Add Main Atmosphere Photo
        document.getElementById('main-image-upload').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('main-image-display');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Add Note to the actual Mood Board
        function addNoteToBoard(imgSrc, name) {
            const container = document.getElementById('selected-notes-container');
            const boardNote = document.createElement('div');
            boardNote.className = 'board-note';
            boardNote.innerHTML = `<img src="${imgSrc}"><span>${name}</span>`;
            
            // Tap to remove
            boardNote.onclick = function() { this.remove(); };
            container.appendChild(boardNote);
        }

        // Save Mood Board as Image using html2canvas
        function saveImage() {
            const captureArea = document.getElementById('capture-area');
            
            // Clean up UI before snapshot (hide placeholder text if empty)
            const titleElement = document.getElementById('board-title-display');
            if(!titleElement.value) titleElement.style.border = 'none';

            html2canvas(captureArea, {
                scale: 2, // High resolution
                useCORS: true,
                backgroundColor: null // Transparent so border-radius shows
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = (document.getElementById('title-input').value || 'scent-board') + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // restore border after snapshot
                titleElement.style.borderBottom = '1px solid #ccc';
            });
        }


        // --- Database Logic (IndexedDB) ---
        let db;
        let allNotes = [];
        const request = indexedDB.open("ScentDatabase", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("scents", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadDatabaseView();
        };

        function saveToIndexedDB() {
            const fileInput = document.getElementById('note-image-upload');
            const nameInput = document.getElementById('note-name-input');
            const file = fileInput.files[0];
            const name = nameInput.value.trim();

            if (!file || !name) return alert("Please select an image and enter a name.");

            const reader = new FileReader();
            reader.onload = function(e) {
                const transaction = db.transaction(["scents"], "readwrite");
                const store = transaction.objectStore("scents");
                store.add({ name: name, image: e.target.result });

                transaction.oncomplete = function() {
                    fileInput.value = '';
                    nameInput.value = '';
                    alert("Note saved to database!");
                    loadDatabaseView();
                };
            };
            reader.readAsDataURL(file);
        }

        function loadDatabaseView() {
            const transaction = db.transaction(["scents"], "readonly");
            const store = transaction.objectStore("scents");
            const getAll = store.getAll();

            getAll.onsuccess = function() {
                allNotes = getAll.result;
                renderNotesList(allNotes);
            };
        }

        function renderNotesList(notesArray) {
            const listContainer = document.getElementById('database-list');
            listContainer.innerHTML = '';
            
            notesArray.forEach(note => {
                const item = document.createElement('div');
                item.className = 'db-note';
                item.innerHTML = `<img src="${note.image}" alt="${note.name}">`;
                // Add to board when tapped from the library
                item.addEventListener('click', () => addNoteToBoard(note.image, note.name));
                listContainer.appendChild(item);
            });
        }

        function filterDatabase() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = allNotes.filter(note => note.name.toLowerCase().includes(query));
            renderNotesList(filtered);
        }

        function exportDatabase() {
            if(allNotes.length === 0) return alert("Your database is empty.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allNotes));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "scent_database_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    const transaction = db.transaction(["scents"], "readwrite");
                    const store = transaction.objectStore("scents");
                    
                    importedData.forEach(item => { delete item.id; store.add(item); });
                    
                    transaction.oncomplete = function() {
                        alert("Database backup imported successfully!");
                        loadDatabaseView();
                    };
                } catch(err) { alert("Error parsing backup file."); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
