<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent Mood Board Builder</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-board-default: #c9f5d1;
            --app-pink: #ffd1dc;
            --dark-pink: #ffb6c1;
            --button-grey: #4a4a4a;
            
            --img-scale: 1;
            --img-x: 0%;
            --img-y: 0%;
            --bot-scale: 1;
            --bot-squish: 1;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--app-pink);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .ui-panel {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button, .file-upload-btn, input[type="text"], input[type="search"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            border: 1px solid #e0e0e0;
            outline: none;
            text-align: center;
            margin: 0;
        }
        
        button, .file-upload-btn {
            background: var(--button-grey);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: block;
        }
        
        button:active, .file-upload-btn:active { background: #333; }
        input[type="file"] { display: none; }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 5px 15px;
        }
        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 8px;
        }
        .slider-group label {
            font-size: 0.8rem;
            color: #555;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            margin: 5px 0 10px 0;
        }

        #library-section {
            display: none; 
            flex-direction: column;
            gap: 10px;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        #database-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            justify-content: flex-start;
        }
        .db-note {
            width: 65px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            position: relative; 
        }
        .db-note img {
            width: 65px; 
            height: 65px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            margin-bottom: 4px;
            display: block;
            pointer-events: none;
        }
        .db-note span {
            font-size: 0.75rem;
            line-height: 1.1;
            word-wrap: break-word; 
            width: 100%;
        }
        
        .delete-db-item {
            position: absolute;
            top: -2px;
            right: -2px;
            background: rgba(255, 255, 255, 0.65); 
            color: #333;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 14px;
            line-height: 18px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.15);
            z-index: 10;
        }

        #capture-area {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1; 
            background-color: var(--bg-board-default);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            border-radius: 0; 
            position: relative;
        }
        
        #top-section {
            width: 100%;
            height: 50%; 
            flex-shrink: 0;
            display: none; 
            overflow: hidden; 
            touch-action: none; 
            position: relative;
        }

        #main-image-display {
            width: 100%;
            height: 100%; 
            object-fit: cover; 
            display: block;
            transform: scale(var(--img-scale)) translate(var(--img-x), var(--img-y));
            transform-origin: center center;
            pointer-events: none; 
        }

        #resizer {
            width: 100%;
            height: 16px;
            background-color: rgba(0, 0, 0, 0.05);
            cursor: row-resize;
            display: none; 
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .resizer-handle {
            width: 40px;
            height: 4px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }
        
        #bottom-section { 
            width: 100%;
            flex: 1; 
            overflow: hidden; 
            display: block; 
        }

        #bottom-content-wrapper {
            display: block; 
            width: 100%;
            padding: 0.8em;
            box-sizing: border-box; 
            transform: scale(var(--bot-scale)) scaleY(var(--bot-squish));
            transform-origin: top left;
        }
        
        #board-title-display {
            display: flex;
            align-items: center;
            width: 100%;
            font-size: 1.7em; 
            padding: 0.75em 1em;
            min-height: 2.8em;
            background-color: white; 
            border: 0.08em solid #cfcfcf; 
            color: #333;
            margin: 0 0 0.8em 0; 
            box-sizing: border-box;
            text-align: left;
            border-radius: 0 !important; 
            line-height: 1.2;
            word-wrap: break-word;
        }
        
        #selected-notes-container {
            display: flex;
            width: 100%;
            gap: 0.5em; 
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        
        .board-note {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1 1 6.5em; 
            max-width: 8.5em; 
            min-width: 4.5em;
            border: 0.15em solid white; 
            padding: 0.4em;
            cursor: pointer;
            box-sizing: border-box;
        }
        
        .board-note img {
            width: 100%; 
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 0; 
            margin-bottom: 0.5em;
            display: block;
            pointer-events: none;
        }
        
        .board-note span {
            font-size: 1.1em; 
            font-weight: 500; 
            text-align: center;
            color: #111;
            line-height: 1.2;
            word-wrap: break-word;
            width: 100%;
            pointer-events: none;
        }

        details {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        details summary { cursor: pointer; font-weight: bold; color: #4a4a4a; margin-bottom: 10px;}
        .db-manage-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        .db-manage-group:last-child { border: none; margin-bottom: 0; padding-bottom: 0;}
    </style>
</head>
<body>

    <!-- ACTION MODAL (EDIT OR DELETE POP-UP) -->
    <div id="action-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center; padding: 20px;">
        <div style="background:white; padding:25px; border-radius:12px; width:100%; max-width:320px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3);">
            
            <!-- Step 1: Choose Action -->
            <div id="modal-step-1">
                <h3 style="margin-top:0; color:#333;">Note Options</h3>
                <p id="modal-note-name" style="margin-bottom:20px; font-size:1rem; color:#666; font-weight:bold;"></p>
                
                <button onclick="showEditStep()" style="background:#007bff; margin-bottom:10px;">Edit Note</button>
                <button onclick="confirmDelete()" style="background:#ff4d4d; margin-bottom:10px;">Delete Note</button>
                <button onclick="closeModal()" style="background:#e0e0e0; color:#333;">Cancel</button>
            </div>

            <!-- Step 2: Edit Form -->
            <div id="modal-step-2" style="display:none;">
                <h3 style="margin-top:0; color:#333;">Edit Note</h3>
                
                <img id="edit-image-preview" style="width:80px; height:80px; object-fit:cover; border-radius:8px; border:1px solid #ccc; margin:0 auto 10px auto; display:block;">
                
                <label class="file-upload-btn" style="background:#e0e0e0; color:#333; margin-bottom:15px;">
                    Upload Replacement Photo
                    <input type="file" id="edit-image-upload" accept="image/*">
                </label>
                
                <input type="text" id="edit-name-input" placeholder="Note Name" style="margin-bottom:15px;">
                
                <button onclick="saveEdit()" style="background:#28a745; margin-bottom:10px;">Save Changes</button>
                <button onclick="closeModal()" style="background:#e0e0e0; color:#333;">Cancel</button>
            </div>

        </div>
    </div>

    <div class="ui-panel">
        <button onclick="toggleLibrary()" style="background: var(--dark-pink); color: #333;">Pick your notes</button>
        
        <div id="library-section">
            <input type="search" id="search-bar" placeholder="Search notes..." oninput="filterDatabase()">
            <div id="database-list"></div>
        </div>

        <label class="file-upload-btn">
            Add a photo
            <input type="file" id="main-image-upload" accept="image/*">
        </label>

        <input type="text" id="title-input" placeholder="Enter your mood board title here" oninput="updateTitle()">

        <div class="color-picker-wrapper">
            <span>Background Color</span>
            <input type="color" id="bg-color-picker" value="#c9f5d1">
        </div>

        <button onclick="saveImage()" style="background: #28a745; font-size: 1.1rem; padding: 15px;">Save the image</button>
    </div>

    <!-- MOOD BOARD DISPLAY -->
    <div id="capture-area">
        <div id="top-section">
            <img id="main-image-display" src="" alt="Atmosphere">
        </div>
        
        <div id="resizer">
            <div class="resizer-handle"></div>
        </div>

        <div id="bottom-section">
            <div id="bottom-content-wrapper">
                <div id="board-title-display">Title will appear here...</div>
                <div id="selected-notes-container"></div>
            </div>
        </div>
    </div>

    <div class="ui-panel" style="margin-top: 0;">
        <h4 style="margin: 0 0 10px 0; color: var(--dark-pink);">Notes & Scent Adjustments</h4>
        <div class="slider-group">
            <label>Overall Scent Size</label>
            <input type="range" id="ctrl-bot-zoom" min="0.4" max="2" step="0.05" value="1">
        </div>
        <div class="slider-group">
            <label>Squish Height (Perspective)</label>
            <input type="range" id="ctrl-bot-squish" min="0.4" max="1.5" step="0.05" value="1">
        </div>
    </div>

    <details>
        <summary>Database Settings (Add Notes / Backup)</summary>
        <div class="db-manage-group">
            <strong>Add New Note</strong>
            <label class="file-upload-btn" style="background: #ccc; color: #333;">
                Choose Image
                <input type="file" id="note-image-upload" accept="image/*">
            </label>
            <input type="text" id="note-name-input" placeholder="Note Title (e.g., Cold Air)">
            <button onclick="saveToIndexedDB()">Save Note to Database</button>
        </div>
        <div class="db-manage-group">
            <strong>Backup & Restore</strong>
            <button onclick="exportDatabase()" style="background: #ccc; color: #333;">Export Database Backup</button>
            <label class="file-upload-btn" style="background: #ccc; color: #333;">
                Import Backup
                <input type="file" id="import-file" accept=".json" onchange="importDatabase(event)">
            </label>
        </div>
    </details>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
        }

        const root = document.documentElement;

        // --- DIRECT TOUCH & PAN JAVASCRIPT FOR PHOTO ---
        const imgContainer = document.getElementById('top-section');
        let imgScale = 1;
        let imgX = 0; 
        let imgY = 0; 

        function updateImgTransform() {
            imgScale = Math.min(Math.max(imgScale, 0.5), 3);
            imgX = Math.min(Math.max(imgX, -50), 50);
            imgY = Math.min(Math.max(imgY, -50), 50);

            root.style.setProperty('--img-scale', imgScale);
            root.style.setProperty('--img-x', imgX + '%');
            root.style.setProperty('--img-y', imgY + '%');
        }

        let touchStartX = 0, touchStartY = 0;
        let initialPinchDist = null;

        imgContainer.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                initialPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        }, {passive: false});

        imgContainer.addEventListener('touchmove', e => {
            e.preventDefault(); 
            
            if (e.touches.length === 1 && initialPinchDist === null) {
                const dx = e.touches[0].clientX - touchStartX;
                const dy = e.touches[0].clientY - touchStartY;
                
                imgX += (dx / imgContainer.clientWidth) * 100 / imgScale; 
                imgY += (dy / imgContainer.clientHeight) * 100 / imgScale;

                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                
                updateImgTransform();
                
            } else if (e.touches.length === 2) {
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                if (initialPinchDist) {
                    const scaleDelta = currentDist / initialPinchDist;
                    imgScale *= scaleDelta;
                    initialPinchDist = currentDist; 
                    updateImgTransform();
                }
            }
        }, {passive: false});

        imgContainer.addEventListener('touchend', e => {
            if (e.touches.length < 2) initialPinchDist = null;
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        });

        // Bottom Scent Controls
        document.getElementById('ctrl-bot-zoom').addEventListener('input', e => {
            const scaleVal = e.target.value;
            root.style.setProperty('--bot-scale', scaleVal);
            const wrapper = document.getElementById('bottom-content-wrapper');
            wrapper.style.width = `${100 / scaleVal}%`; 
        });
        document.getElementById('ctrl-bot-squish').addEventListener('input', e => root.style.setProperty('--bot-squish', e.target.value));

        // --- RESIZER DIVIDER LINE ---
        const resizer = document.getElementById('resizer');
        const captureArea = document.getElementById('capture-area');
        let isResizing = false;

        resizer.addEventListener('mousedown', () => {
            isResizing = true;
            document.addEventListener('mousemove', handleMouseMoveResizer);
            document.addEventListener('mouseup', stopResizingDivider, { once: true });
        });

        resizer.addEventListener('touchstart', (e) => {
            isResizing = true;
            document.addEventListener('touchmove', handleTouchMoveResizer, { passive: false });
            document.addEventListener('touchend', stopResizingDivider, { once: true });
        });

        function handleMouseMoveResizer(e) { if (isResizing) adjustHeight(e.clientY); }
        
        function handleTouchMoveResizer(e) {
            if (isResizing) {
                e.preventDefault(); 
                adjustHeight(e.touches[0].clientY);
            }
        }

        function adjustHeight(clientY) {
            const containerRect = captureArea.getBoundingClientRect();
            let newHeightPercent = ((clientY - containerRect.top) / containerRect.height) * 100;
            if (newHeightPercent < 15) newHeightPercent = 15;
            if (newHeightPercent > 85) newHeightPercent = 85;
            imgContainer.style.height = `${newHeightPercent}%`;
        }

        function stopResizingDivider() {
            isResizing = false;
            document.removeEventListener('mousemove', handleMouseMoveResizer);
            document.removeEventListener('touchmove', handleTouchMoveResizer);
        }

        function toggleLibrary() {
            const lib = document.getElementById('library-section');
            lib.style.display = lib.style.display === 'flex' ? 'none' : 'flex';
        }

        function updateTitle() {
            const val = document.getElementById('title-input').value;
            document.getElementById('board-title-display').innerText = val ? val : "Title will appear here...";
        }

        document.getElementById('bg-color-picker').addEventListener('input', (e) => {
            document.getElementById('capture-area').style.backgroundColor = e.target.value;
        });

        document.getElementById('main-image-upload').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('main-image-display');
                    img.src = e.target.result;
                    document.getElementById('top-section').style.display = 'block';
                    document.getElementById('resizer').style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }
        });

        function addNoteToBoard(imgSrc, name) {
            const container = document.getElementById('selected-notes-container');
            const boardNote = document.createElement('div');
            boardNote.className = 'board-note';
            boardNote.innerHTML = `<img src="${imgSrc}"><span>${name}</span>`;
            boardNote.onclick = function() { this.remove(); };
            container.appendChild(boardNote);
        }

        function saveImage() {
            const titleDisplay = document.getElementById('board-title-display');
            const originalText = titleDisplay.innerText;
            if (originalText === "Title will appear here...") {
                titleDisplay.innerText = "";
            }
            
            const wasResizerVisible = resizer.style.display !== 'none';
            if (wasResizerVisible) resizer.style.display = 'none';

            const rect = captureArea.getBoundingClientRect();

            html2canvas(captureArea, {
                scale: 2, 
                useCORS: true,
                backgroundColor: document.getElementById('bg-color-picker').value,
                width: rect.width,
                height: rect.height,
                scrollY: -window.scrollY
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = (document.getElementById('title-input').value || 'scent-board') + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                titleDisplay.innerText = originalText;
                if(wasResizerVisible) resizer.style.display = 'flex';
            });
        }

        // --- Database & Modal Logic ---
        let db;
        let allNotes = [];
        let currentEditId = null;
        let currentEditImg = null;

        const request = indexedDB.open("ScentDatabase", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("scents", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadDatabaseView();
        };

        function saveToIndexedDB() {
            const fileInput = document.getElementById('note-image-upload');
            const nameInput = document.getElementById('note-name-input');
            const file = fileInput.files[0];
            const name = nameInput.value.trim();

            if (!file || !name) return alert("Please select an image and enter a name.");

            const reader = new FileReader();
            reader.onload = function(e) {
                const transaction = db.transaction(["scents"], "readwrite");
                const store = transaction.objectStore("scents");
                store.add({ name: name, image: e.target.result });

                transaction.oncomplete = function() {
                    fileInput.value = '';
                    nameInput.value = '';
                    loadDatabaseView();
                };
            };
            reader.readAsDataURL(file);
        }

        // MODAL CONTROLS
        function openNoteOptions(id, event) {
            event.stopPropagation();
            const note = allNotes.find(n => n.id === id);
            if(!note) return;

            currentEditId = id;
            currentEditImg = note.image;
            
            document.getElementById('modal-note-name').innerText = `"${note.name}"`;
            document.getElementById('edit-name-input').value = note.name;
            document.getElementById('edit-image-upload').value = '';
            document.getElementById('edit-image-preview').src = note.image;

            document.getElementById('modal-step-1').style.display = 'block';
            document.getElementById('modal-step-2').style.display = 'none';
            document.getElementById('action-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('action-modal').style.display = 'none';
            currentEditId = null;
            currentEditImg = null;
        }

        function showEditStep() {
            document.getElementById('modal-step-1').style.display = 'none';
            document.getElementById('modal-step-2').style.display = 'block';
        }

        function confirmDelete() {
            if (!currentEditId) return;
            const transaction = db.transaction(["scents"], "readwrite");
            transaction.objectStore("scents").delete(currentEditId);
            transaction.oncomplete = function() {
                closeModal();
                loadDatabaseView(); 
            };
        }

        // Live Preview of Replacement Edit Photo
        document.getElementById('edit-image-upload').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentEditImg = e.target.result;
                    document.getElementById('edit-image-preview').src = currentEditImg;
                };
                reader.readAsDataURL(file);
            }
        });

        // Save Edits to DB
        function saveEdit() {
            if (!currentEditId) return;
            const newName = document.getElementById('edit-name-input').value.trim();
            if (!newName) return alert("Note name cannot be empty.");

            const transaction = db.transaction(["scents"], "readwrite");
            const store = transaction.objectStore("scents");
            
            const getReq = store.get(currentEditId);
            getReq.onsuccess = function() {
                const data = getReq.result;
                data.name = newName;
                data.image = currentEditImg;
                
                const updateReq = store.put(data);
                updateReq.onsuccess = function() {
                    closeModal();
                    loadDatabaseView();
                };
            };
        }

        function loadDatabaseView() {
            const transaction = db.transaction(["scents"], "readonly");
            const store = transaction.objectStore("scents");
            const getAll = store.getAll();

            getAll.onsuccess = function() {
                allNotes = getAll.result;
                renderNotesList(allNotes);
            };
        }

        function renderNotesList(notesArray) {
            const listContainer = document.getElementById('database-list');
            listContainer.innerHTML = '';
            
            notesArray.forEach(note => {
                const item = document.createElement('div');
                item.className = 'db-note';
                
                item.innerHTML = `
                    <div class="delete-db-item" onclick="openNoteOptions(${note.id}, event)">×</div>
                    <img src="${note.image}" alt="${note.name}">
                    <span>${note.name}</span>
                `;
                
                item.addEventListener('click', (e) => {
                    if(e.target.className === 'delete-db-item') return;
                    addNoteToBoard(note.image, note.name);
                });
                listContainer.appendChild(item);
            });
        }

        function filterDatabase() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = allNotes.filter(note => note.name.toLowerCase().includes(query));
            renderNotesList(filtered);
        }

        function exportDatabase() {
            if(allNotes.length === 0) return alert("Your database is empty.");
            
            const jsonData = JSON.stringify(allNotes);
            const blob = new Blob([jsonData], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", url);
            downloadAnchor.setAttribute("download", "scent_database_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(url);
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    const transaction = db.transaction(["scents"], "readwrite");
                    const store = transaction.objectStore("scents");
                    
                    importedData.forEach(item => { delete item.id; store.add(item); });
                    
                    transaction.oncomplete = function() {
                        alert("Database backup imported successfully!");
                        loadDatabaseView();
                    };
                } catch(err) { alert("Error parsing backup file."); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
