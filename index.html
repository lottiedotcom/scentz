<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent Mood Board Builder</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-board-default: #c9f5d1;
            --app-pink: #ffd1dc;
            --dark-pink: #ffb6c1;
            --button-grey: #4a4a4a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--app-pink);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Top Controls UI */
        .ui-panel {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button, .file-upload-btn, input[type="text"], input[type="search"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            border: 1px solid #e0e0e0;
            outline: none;
            text-align: center;
            margin: 0;
        }
        
        button, .file-upload-btn {
            background: var(--button-grey);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: block;
        }
        
        button:active, .file-upload-btn:active { background: #333; }
        input[type="file"] { display: none; }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 5px 15px;
        }
        input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
        }

        #library-section {
            display: none; 
            flex-direction: column;
            gap: 10px;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        #database-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .db-note {
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .db-note img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        /* --- MOOD BOARD STYLING --- */
        #capture-area {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1; 
            background-color: var(--bg-board-default);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            border-radius: 0; 
            position: relative;
        }
        
        #top-section {
            width: 100%;
            height: 50%; 
            flex-shrink: 0;
            display: none; 
        }

        #main-image-display {
            width: 100%;
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        #resizer {
            width: 100%;
            height: 16px;
            background-color: rgba(0, 0, 0, 0.05);
            cursor: row-resize;
            display: none; 
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .resizer-handle {
            width: 40px;
            height: 4px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }
        
        #bottom-section { 
            width: 100%;
            flex: 1; 
            overflow: hidden; 
            display: block; 
        }

        #bottom-content-wrapper {
            display: block; 
            width: 100%;
            padding: 15px;
            box-sizing: border-box; 
            transform-origin: top left; 
        }
        
        /* The title box forced to span the entire wrapper width */
        #board-title-display {
            display: block;
            width: 100%;
            font-size: 1.5rem;
            padding: 12px 15px;
            background-color: white; 
            border: 1px solid #cfcfcf; 
            color: #333;
            margin: 0 0 15px 0; 
            box-sizing: border-box;
            text-align: left;
            border-radius: 0 !important; 
            -webkit-appearance: none; 
        }
        
        #selected-notes-container {
            display: flex;
            width: 100%;
            gap: 8px; 
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        
        .board-note {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 82px; 
            border: 2px solid white; 
            padding: 6px;
            cursor: pointer;
            box-sizing: border-box;
        }
        
        .board-note img {
            width: 66px; 
            height: 66px;
            object-fit: cover;
            border-radius: 0; 
            margin-bottom: 8px;
        }
        
        .board-note span {
            font-size: 0.9rem;
            text-align: center;
            color: #111;
            line-height: 1.2;
            word-wrap: break-word;
            width: 100%;
        }

        /* Database Management Section */
        details {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        details summary { cursor: pointer; font-weight: bold; color: #4a4a4a; margin-bottom: 10px;}
        .db-manage-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        .db-manage-group:last-child { border: none; margin-bottom: 0; padding-bottom: 0;}
    </style>
</head>
<body>

    <div class="ui-panel">
        <button onclick="toggleLibrary()" style="background: var(--dark-pink); color: #333;">Pick your notes</button>
        
        <div id="library-section">
            <input type="search" id="search-bar" placeholder="Search notes..." oninput="filterDatabase()">
            <div id="database-list"></div>
        </div>

        <input type="text" id="title-input" placeholder="Enter your mood board title here" oninput="updateTitle()">

        <label class="file-upload-btn">
            Add a photo
            <input type="file" id="main-image-upload" accept="image/*">
        </label>

        <div class="color-picker-wrapper">
            <span>Background Color</span>
            <input type="color" id="bg-color-picker" value="#c9f5d1">
        </div>

        <button onclick="saveImage()" style="background: #28a745;">Save the image</button>
    </div>

    <div id="capture-area">
        
        <div id="top-section">
            <img id="main-image-display" src="" alt="Atmosphere">
        </div>
        
        <div id="resizer">
            <div class="resizer-handle"></div>
        </div>

        <div id="bottom-section">
            <div id="bottom-content-wrapper">
                <input type="text" id="board-title-display" placeholder="Title will appear here..." readonly>
                <div id="selected-notes-container"></div>
            </div>
        </div>

    </div>

    <details>
        <summary>Database Settings (Add Notes / Backup)</summary>
        <div class="db-manage-group">
            <strong>Add New Note</strong>
            <label class="file-upload-btn" style="background: #ccc; color: #333;">
                Choose Image
                <input type="file" id="note-image-upload" accept="image/*">
            </label>
            <input type="text" id="note-name-input" placeholder="Note Title (e.g., Cold Air)">
            <button onclick="saveToIndexedDB()">Save Note to Database</button>
        </div>
        <div class="db-manage-group">
            <strong>Backup & Restore</strong>
            <button onclick="exportDatabase()" style="background: #ccc; color: #333;">Export Database Backup</button>
            <label class="file-upload-btn" style="background: #ccc; color: #333;">
                Import Backup
                <input type="file" id="import-file" accept=".json" onchange="importDatabase(event)">
            </label>
        </div>
    </details>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
        }

        const resizer = document.getElementById('resizer');
        const topSection = document.getElementById('top-section');
        const captureArea = document.getElementById('capture-area');
        let isResizing = false;

        resizer.addEventListener('mousedown', () => {
            isResizing = true;
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', stopResizing, { once: true });
        });

        resizer.addEventListener('touchstart', (e) => {
            isResizing = true;
            document.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.addEventListener('touchend', stopResizing, { once: true });
        });

        function handleMouseMove(e) { if (isResizing) adjustHeight(e.clientY); }
        
        function handleTouchMove(e) {
            if (isResizing) {
                e.preventDefault(); 
                adjustHeight(e.touches[0].clientY);
            }
        }

        function adjustHeight(clientY) {
            const containerRect = captureArea.getBoundingClientRect();
            let newHeightPercent = ((clientY - containerRect.top) / containerRect.height) * 100;
            
            if (newHeightPercent < 15) newHeightPercent = 15;
            if (newHeightPercent > 85) newHeightPercent = 85;
            
            topSection.style.height = `${newHeightPercent}%`;
            scaleBottomContent();
        }

        function stopResizing() {
            isResizing = false;
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('touchmove', handleTouchMove);
        }

        // THE FIX: This function now actively counter-stretches the width when it shrinks the height
        function scaleBottomContent() {
            const bottomSection = document.getElementById('bottom-section');
            const wrapper = document.getElementById('bottom-content-wrapper');

            // Reset completely to get an accurate measurement
            wrapper.style.transform = 'scale(1)';
            wrapper.style.width = '100%';

            // Force browser layout recalculation
            void wrapper.offsetHeight; 

            const availableHeight = bottomSection.clientHeight;
            const contentHeight = wrapper.scrollHeight;

            if (contentHeight > availableHeight && availableHeight > 0) {
                const scale = availableHeight / contentHeight;
                wrapper.style.transform = `scale(${scale})`;
                
                // COUNTER-STRETCH: This mathematically pushes the edge back to 100% full width
                wrapper.style.width = `${100 / scale}%`; 
            }
        }

        function toggleLibrary() {
            const lib = document.getElementById('library-section');
            lib.style.display = lib.style.display === 'flex' ? 'none' : 'flex';
        }

        function updateTitle() {
            document.getElementById('board-title-display').value = document.getElementById('title-input').value;
            scaleBottomContent(); 
        }

        document.getElementById('bg-color-picker').addEventListener('input', (e) => {
            document.getElementById('capture-area').style.backgroundColor = e.target.value;
        });

        document.getElementById('main-image-upload').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('main-image-display');
                    img.src = e.target.result;
                    
                    document.getElementById('top-section').style.display = 'block';
                    document.getElementById('resizer').style.display = 'flex';
                    scaleBottomContent();
                };
                reader.readAsDataURL(file);
            }
        });

        function addNoteToBoard(imgSrc, name) {
            const container = document.getElementById('selected-notes-container');
            const boardNote = document.createElement('div');
            boardNote.className = 'board-note';
            boardNote.innerHTML = `<img src="${imgSrc}"><span>${name}</span>`;
            
            boardNote.onclick = function() { 
                this.remove(); 
                scaleBottomContent(); 
            };
            container.appendChild(boardNote);
            scaleBottomContent(); 
        }

        function saveImage() {
            const captureArea = document.getElementById('capture-area');
            const titleInput = document.getElementById('board-title-display');
            const resizerHandle = document.getElementById('resizer');
            
            const originalPlaceholder = titleInput.placeholder;
            if(!titleInput.value) { titleInput.placeholder = ""; }
            const wasResizerVisible = resizerHandle.style.display !== 'none';
            if(wasResizerVisible) resizerHandle.style.display = 'none';

            html2canvas(captureArea, {
                scale: 2, 
                useCORS: true,
                backgroundColor: document.getElementById('bg-color-picker').value 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = (document.getElementById('title-input').value || 'scent-board') + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                titleInput.placeholder = originalPlaceholder;
                if(wasResizerVisible) resizerHandle.style.display = 'flex';
            });
        }

        // --- Database Logic ---
        let db;
        let allNotes = [];
        const request = indexedDB.open("ScentDatabase", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("scents", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadDatabaseView();
        };

        function saveToIndexedDB() {
            const fileInput = document.getElementById('note-image-upload');
            const nameInput = document.getElementById('note-name-input');
            const file = fileInput.files[0];
            const name = nameInput.value.trim();

            if (!file || !name) return alert("Please select an image and enter a name.");

            const reader = new FileReader();
            reader.onload = function(e) {
                const transaction = db.transaction(["scents"], "readwrite");
                const store = transaction.objectStore("scents");
                store.add({ name: name, image: e.target.result });

                transaction.oncomplete = function() {
                    fileInput.value = '';
                    nameInput.value = '';
                    alert("Note saved to database!");
                    loadDatabaseView();
                };
            };
            reader.readAsDataURL(file);
        }

        function loadDatabaseView() {
            const transaction = db.transaction(["scents"], "readonly");
            const store = transaction.objectStore("scents");
            const getAll = store.getAll();

            getAll.onsuccess = function() {
                allNotes = getAll.result;
                renderNotesList(allNotes);
            };
        }

        function renderNotesList(notesArray) {
            const listContainer = document.getElementById('database-list');
            listContainer.innerHTML = '';
            
            notesArray.forEach(note => {
                const item = document.createElement('div');
                item.className = 'db-note';
                item.innerHTML = `<img src="${note.image}" alt="${note.name}">`;
                item.addEventListener('click', () => addNoteToBoard(note.image, note.name));
                listContainer.appendChild(item);
            });
        }

        function filterDatabase() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = allNotes.filter(note => note.name.toLowerCase().includes(query));
            renderNotesList(filtered);
        }

        function exportDatabase() {
            if(allNotes.length === 0) return alert("Your database is empty.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allNotes));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "scent_database_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    const transaction = db.transaction(["scents"], "readwrite");
                    const store = transaction.objectStore("scents");
                    
                    importedData.forEach(item => { delete item.id; store.add(item); });
                    
                    transaction.oncomplete = function() {
                        alert("Database backup imported successfully!");
                        loadDatabaseView();
                    };
                } catch(err) { alert("Error parsing backup file."); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
